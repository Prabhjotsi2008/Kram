<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../dist/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Kram</title>
</head>
<body class="text-amber-100 bg-slate-950 mx-4 font-mono">
    <!-- header starts here -->
    <header class="flex items-center justify-center py-4 ">
        <div class="flex items-center justify-center bg-slate-800 rounded-md border-2 border-slate-600 px-3 py-2">
        <h1 class="text-3xl font-bold text-amber-200">Kram</h1>
        </div>
    </header>
    <!-- header ends here  -->

    <main class="flex flex-col items-center justify-center gap-2 md:gap-4 mt-6 md:mt-10">
        <!-- add task container starts  -->
        <div class="flex items-center justify-center">
        <p class="text-2xl font-semibold">Add Tasks to Kram</p>
        </div>

        <div class="search-cont flex items-center justify-center gap-5 md:gap-8 py-4">
            <input type="text" placeholder="Go to Gym" id="input-task" class="outline-none border-2 border-slate-600 focus:border-amber-200 rounded-md py-2 px-4 text-xl bg-slate-800">

            <button id="add-btn" class="border-2 border-slate-600 bg-slate-800 text-amber-200 p-2 rounded-md hover:border-amber-200 active:border-slate-600">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <!-- add task container ends  -->
         
    </main>
</body>
</html>
